name: Build

on:
  workflow_dispatch:
  push:
  pull_request:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up MSVC
        uses: blytkerchan/devsecops-setup-msvc@v1
        with:
          arch: x64

      - name: Download HashLink
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri 'https://api.github.com/repos/HaxeFoundation/hashlink/releases/latest'
          $asset = $release.assets | Where-Object { $_.name -like 'hashlink-*-win.zip' } | Select-Object -First 1
          if (-not $asset) {
            throw 'Could not find a Windows HashLink release asset.'
          }

          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile 'hashlink-win.zip'
          Expand-Archive -LiteralPath 'hashlink-win.zip' -DestinationPath 'hashlink' -Force

          $hashlinkDir = Get-ChildItem -Path 'hashlink' -Directory | Select-Object -First 1
          if (-not $hashlinkDir) {
            throw 'Could not locate the extracted HashLink directory.'
          }

          "HASHLINK=$($hashlinkDir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure CMake
        run: cmake --preset release

      - name: Build release
        run: cmake --build out/build/release --config Release

      - name: Package release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path 'dist/native' | Out-Null
          Copy-Item 'out/build/release/extension/midisf2.hdll' 'dist/native/midisf2.hdll'
          if (Test-Path 'out/build/release/extension/midisf2.lib') {
            Copy-Item 'out/build/release/extension/midisf2.lib' 'dist/native/midisf2.lib'
          }

      - name: Verify packaged files
        shell: pwsh
        run: |
          if (-not (Test-Path 'dist/native/midisf2.hdll')) {
            throw 'Missing dist/native/midisf2.hdll'
          }

      - name: Create release zip
        shell: pwsh
        run: |
          if (Test-Path 'hlmidisf2-windows.zip') {
            Remove-Item 'hlmidisf2-windows.zip' -Force
          }
          Compress-Archive -Path 'dist/native/*' -DestinationPath 'hlmidisf2-windows.zip'

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: hlmidisf2-windows
          path: dist/native

      - name: Update nightly release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: andelf/nightly-release@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          name: Nightly Release
          body: |
            Automated nightly Windows build of `hlmidisf2`.

            Download `hlmidisf2-windows.zip` and extract it where you want to keep the native files.
          files: |
            hlmidisf2-windows.zip
